<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/main.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-wrapper">
          <div class="logo">
            <img src="./assets/imgs/INSURE.png" alt="logo" />
          </div>
          <nav class="nav">
            <ul class="nav-list">
              <li><a href="#">Home</a></li>
              <li><a href="#">About</a></li>
              <li><a href="#">Services</a></li>
            </ul>
          </nav>
          <div class="header-btn">
            <a href="#"><button>Get Started</button></a>
          </div>
        </div>
      </div>
    </header>

    <section class="site__hero">
      <div class="container">
        <div class="site__hero-wrapper">
          <div class="line-top"></div>
          <h1 class="site__hero-name">Humanizing your insurance.</h1>
          <p class="site__hero-text">
            Get your life insurance coverage easier and faster. We blend our
            expertise and technology to help you find the plan that’s right for
            you. Ensure you and your loved ones are protected.
          </p>
          <a href="#" class="view-plan-link">VIEW PLANS</a>
        </div>
        <img
          src="./assets/imgs/Bitmap Copy.png"
          alt="family img"
          class="family-img"
        />
        <img
          src="./assets/imgs/mobile bg1.svg"
          alt="section__hero-bg1"
          class="section__hero-bg1"
        />
        <img
          src="./assets/imgs/mobile bg2.svg"
          alt="section__hero-bg2"
          class="section__hero-bg2"
        />
      </div>
    </section>
  </body>
